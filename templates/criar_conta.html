<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar Conta — Banco de Horas Ibiporã</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background:#1a3a6b; min-height:100vh; display:flex; align-items:center; }
    .card { border:none; box-shadow:0 8px 32px rgba(0,0,0,.25); border-radius:16px; }
    #step2 { display:none; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill text-white" style="font-size:2.5rem"></i>
        <h4 class="text-white mt-2 mb-0">Criar Conta</h4>
        <p class="text-white-50 small">Banco de Horas — Prefeitura de Ibiporã</p>
      </div>

      <div class="card p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post" id="formCadastro" action="{{ url_for('criar_conta') }}">
          <!-- STEP 1: CPF -->
          <div id="step1">
            <h6 class="fw-bold mb-3">Passo 1 — Identificação</h6>
            <div class="mb-3">
              <label class="form-label fw-semibold">Seu CPF</label>
              <div class="input-group">
                <input type="text" id="cpfInput" name="cpf" class="form-control form-control-lg"
                       placeholder="000.000.000-00" maxlength="14" required>
                <button type="button" class="btn btn-primary" id="btnVerificar">
                  <i class="bi bi-search"></i> Verificar
                </button>
              </div>
              <div id="msgCpf" class="mt-2 small"></div>
            </div>
          </div>

          <!-- STEP 2: Completar cadastro (aparece após verificação) -->
          <div id="step2">
            <hr>
            <h6 class="fw-bold mb-3">Passo 2 — Complete seu cadastro</h6>

            <!-- Dados pré-preenchidos (readonly) -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Nome</label>
              <input type="text" id="nomeDisplay" class="form-control bg-light" readonly>
              <input type="hidden" name="nome_confirmado" id="nomeHidden">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Nível de acesso</label>
              <input type="text" id="nivelDisplay" class="form-control bg-light" readonly>
              <input type="hidden" name="nivel" id="nivelHidden">
              <input type="hidden" name="secretaria" id="secretariaHidden">
              <input type="hidden" name="setor" id="setorHidden">
              <input type="hidden" name="matricula" id="matriculaHidden">
            </div>

            <!-- Campos que o usuário preenche -->
            <div class="mb-3">
              <label class="form-label fw-semibold">E-mail <span class="text-muted small">(para recuperação de senha)</span></label>
              <input type="email" name="email" class="form-control" placeholder="seu@email.com">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Senha <small class="text-muted">(mín. 8 caracteres)</small></label>
              <input type="password" name="senha" class="form-control" minlength="8" id="senhaInput">
              <div class="progress mt-1" style="height:4px">
                <div class="progress-bar" id="forcaBarra" style="width:0%"></div>
              </div>
              <small class="text-muted" id="forcaTexto"></small>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Confirmar senha</label>
              <input type="password" name="confirmar" class="form-control" id="confirmarInput">
              <small id="msgSenha" class="text-muted"></small>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-lg fw-semibold">
              <i class="bi bi-check-circle me-1"></i>Criar minha conta
            </button>
          </div>
        </form>

        <div class="text-center mt-3">
          <a href="/login" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Voltar ao login</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Máscara CPF
const cpfInp = document.getElementById('cpfInput');
cpfInp.addEventListener('input', function () {
  let v = this.value.replace(/\D/g,'').slice(0,11);
  if(v.length>9)v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  else if(v.length>6)v=v.replace(/(\d{3})(\d{3})(\d{0,3})/,'$1.$2.$3');
  else if(v.length>3)v=v.replace(/(\d{3})(\d{0,3})/,'$1.$2');
  this.value=v;
});

// Verificar CPF
document.getElementById('btnVerificar').addEventListener('click', async () => {
  const cpf = cpfInp.value.trim();
  if (cpf.length < 14) { document.getElementById('msgCpf').innerHTML = '<span class="text-danger">Informe o CPF completo.</span>'; return; }
  document.getElementById('btnVerificar').disabled = true;
  document.getElementById('msgCpf').innerHTML = '<span class="text-muted"><i class="bi bi-hourglass-split me-1"></i>Verificando...</span>';

  const resp = await fetch('{{ url_for("api_verificar_cpf") }}?cpf=' + encodeURIComponent(cpf));
  const data = await resp.json();

  if (!data.ok) {
    document.getElementById('msgCpf').innerHTML = `<span class="text-danger"><i class="bi bi-x-circle me-1"></i>${data.msg}</span>`;
    document.getElementById('btnVerificar').disabled = false;
    document.getElementById('step2').style.display = 'none';
    return;
  }

  let avisoHtml = data.aviso
    ? `<div class="alert alert-warning py-2 small mt-2"><i class="bi bi-info-circle me-1"></i>${data.aviso}</div>`
    : '';
  document.getElementById('msgCpf').innerHTML =
    `<span class="text-success"><i class="bi bi-check-circle me-1"></i>CPF encontrado!</span>${avisoHtml}`;

  document.getElementById('nomeDisplay').value   = data.nome || '(não localizado no cadastro)';
  document.getElementById('nomeHidden').value    = data.nome;
  document.getElementById('nivelDisplay').value  = data.nivel_label;
  document.getElementById('nivelHidden').value   = data.nivel;
  document.getElementById('matriculaHidden').value = data.matricula || '';

  // Preenche vínculos como campos hidden
  document.querySelectorAll('.vinculo-hidden').forEach(e => e.remove());
  (data.vinculos || []).forEach(v => {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = 'vinculos'; inp.value = v;
    inp.className = 'vinculo-hidden';
    document.getElementById('formCadastro').appendChild(inp);
  });

  document.getElementById('step2').style.display = '';
  document.querySelector('[name=email]').focus();
});

// Força da senha
document.getElementById('senhaInput').addEventListener('input', function() {
  const v = this.value;
  let forca = 0;
  if(v.length >= 8) forca++;
  if(/[A-Z]/.test(v)) forca++;
  if(/[0-9]/.test(v)) forca++;
  if(/[^a-zA-Z0-9]/.test(v)) forca++;
  const cores = ['bg-danger','bg-warning','bg-info','bg-success'];
  const textos = ['Muito fraca','Fraca','Média','Forte'];
  const barra = document.getElementById('forcaBarra');
  barra.className = 'progress-bar ' + (cores[forca-1] || 'bg-danger');
  barra.style.width = (forca * 25) + '%';
  document.getElementById('forcaTexto').textContent = textos[forca-1] || '';
  verificarSenhas();
});

document.getElementById('confirmarInput').addEventListener('input', verificarSenhas);
function verificarSenhas() {
  const s = document.getElementById('senhaInput').value;
  const c = document.getElementById('confirmarInput').value;
  const msg = document.getElementById('msgSenha');
  if (!c) { msg.textContent=''; return; }
  if (s===c) { msg.className='text-success small'; msg.textContent='✓ Senhas coincidem'; }
  else       { msg.className='text-danger small';  msg.textContent='✗ Senhas não coincidem'; }
}
</script>
</body>
</html>
