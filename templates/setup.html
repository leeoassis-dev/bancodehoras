<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuração Inicial — Banco de Horas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:#1a3a6b;min-height:100vh;display:flex;align-items:center;}</style>
</head>
<body>
<div class="container"><div class="row justify-content-center"><div class="col-md-5">
  <div class="text-center mb-4">
    <i class="bi bi-gear-fill text-white" style="font-size:3rem"></i>
    <h4 class="text-white mt-2">Configuração Inicial</h4>
    <p class="text-white-50 small">Crie o primeiro usuário administrador (Master)</p>
  </div>
  <div class="card p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">CPF</label>
        <input type="text" name="cpf" id="cpf" class="form-control" maxlength="14" placeholder="000.000.000-00" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome completo</label>
        <input type="text" name="nome" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" name="email" class="form-control" placeholder="Opcional">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Senha (mín. 8 caracteres)</label>
        <input type="password" name="senha" class="form-control" minlength="8" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirmar senha</label>
        <input type="password" name="confirmar" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-success w-100 fw-semibold">Criar administrador e entrar</button>
    </form>
  </div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('cpf').addEventListener('input',function(){
  let v=this.value.replace(/\D/g,'').slice(0,11);
  if(v.length>9)v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  else if(v.length>6)v=v.replace(/(\d{3})(\d{3})(\d{0,3})/,'$1.$2.$3');
  else if(v.length>3)v=v.replace(/(\d{3})(\d{0,3})/,'$1.$2');
  this.value=v;
});
</script>
</body>
</html>
