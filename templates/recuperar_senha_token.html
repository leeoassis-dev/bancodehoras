<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova Senha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:#1a3a6b;min-height:100vh;display:flex;align-items:center;}</style>
</head>
<body>
<div class="container"><div class="row justify-content-center"><div class="col-md-5">
  <div class="card p-4">
    <h5 class="fw-bold mb-3"><i class="bi bi-shield-lock me-2 text-success"></i>Definir Nova Senha</h5>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nova senha <small class="text-muted">(mín. 8 caracteres)</small></label>
        <input type="password" name="senha_nova" class="form-control" minlength="8" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirmar nova senha</label>
        <input type="password" name="confirmar" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-success w-100 fw-semibold">Salvar nova senha</button>
    </form>
  </div>
</div></div></div>
</body>
</html>
